<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        button {
            font-size: 16px;
            padding: 10px 15px;
            background-color: #f0f0f0;
            border: 1px solid #767676;
            border-radius: 4px;
            cursor: pointer;
        }
        button:active {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <h1>Welcome to CampusLuv</h1>
    <button id="pi-pay-button">Pay with Pi</button>

    <script>
        // Initialize Pi SDK
        const Pi = window.Pi;
        // NOTE: Set sandbox: true for Testnet testing. Set to false when moving to Mainnet.
        Pi.init({ version: "2.0", sandbox: true }); 

        document.getElementById('pi-pay-button').addEventListener('click', () => {
            Pi.createPayment({
                amount: 1,
                memo: "Testing Step 10 Completion",
                metadata: { orderId: "step-10-test-transaction" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    // Send the payment ID to your Vercel serverless function for approval
                    fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId })
                    })
                    .then(res => res.json())
                    .then(data => console.log("Server approved initiation:", data))
                    .catch(err => console.error("Approval error:", err));
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    // Send the final blockchain transaction ID to your backend to finalize
                    fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        alert("Transaction complete! You can now check your Pi Developer Checklist.");
                    })
                    .catch(err => console.error("Completion error:", err));
                },
                onCancel: function(paymentId) {
                    console.log("Payment cancelled by user. ID:", paymentId);
                },
                onError: function(error, paymentId) {
                    console.error("Pi SDK Error:", error, "Payment ID:", paymentId);
                }
            });
        });
    </script>
</body>
</html>
