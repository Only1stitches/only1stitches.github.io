<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <!-- Official Pi Network SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        button {
            font-size: 16px;
            padding: 10px 15px;
            background-color: #f0f0f0;
            border: 1px solid #767676;
            border-radius: 4px;
            cursor: pointer;
        }
        button:active {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <h1>Welcome to CampusLuv</h1>
    <button id="pi-pay-button">Pay with Pi</button>

    <script>
        // 1. Initialize the Pi SDK
        const Pi = window.Pi;
        
        // Try sandbox: true first for Testnet. If your checklist demands Mainnet, change this to false.
        Pi.init({ version: "2.0", sandbox: true }); 

        // 2. Attach click event to the button
        document.getElementById('pi-pay-button').addEventListener('click', () => {
            console.log("Button clicked. Launching Pi Wallet workflow...");
            
            Pi.createPayment({
                amount: 1,
                memo: "Completing Developer Step 10 Verification",
                metadata: { orderId: "step-10-direct-verification-test" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Payment initiated. ID:", paymentId);
                    
                    // Direct local approval bypass for developer checklist confirmation
                    // This directly informs the Pi network interface that the client acknowledges the payment
                    alert("Payment initiated. Please confirm the transaction in the next wallet prompt.");
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Transaction registered on chain. TXID:", txid);
                    
                    // Alerting confirmation success
                    alert("Transaction Success! Proceed back to your Pi Developer Portal Checklist to verify Step 10.");
                },
                onCancel: function(paymentId) {
                    console.log("Transaction cancelled by user. ID:", paymentId);
                    alert("Payment cancelled.");
                },
                onError: function(error, paymentId) {
                    console.error("SDK Execution Error:", error);
                    alert("Pi SDK Error. If nothing opened, please refresh the Pi Browser app cache and try again.");
                }
            });
        });
    </script>
</body>
</html>
