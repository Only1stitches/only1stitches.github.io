<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f0f2f5; color: #1c1e21; }
        .container { max-width: 400px; margin: auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #673ab7; margin-bottom: 10px; }
        p { color: #65676b; margin-bottom: 30px; }
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; transition: all 0.2s ease; }
        #login-btn { background: #673ab7; color: white; }
        #pay-btn { background: #ff9800; color: white; display: none; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>CampusLuv</h1>
        <p id="status">Connecting to Pi Network...</p>
        <button id="login-btn">Login with Pi</button>
        <button id="pay-btn">Pay 1 Pi to Start</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function onIncompletePaymentFound(payment) {
            // This function automatically tells the Pi Network to finish the old payment
            try {
                await fetch('/api/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                });
                window.location.reload(true);
            } catch (e) {
                console.log("Stuck payment found; cleaning up...");
            }
        };

        async function auth() {
            try {
                const auth = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
                document.getElementById('status').innerHTML = `Welcome, <strong>${auth.user.username}</strong>!`;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('pay-btn').style.display = 'block';
            } catch (err) {
                document.getElementById('status').innerText = "Login failed. Please refresh.";
            }
        }

        async function createPayment() {
            try {
                const paymentData = {
                    amount: 1.0,
                    memo: "CampusLuv Subscription",
                    metadata: { type: "subscription" }
                };
                const callbacks = {
                    onReadyForServerApproval: (paymentId) => {
                        fetch('/api/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId }) });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        fetch('/api/complete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId, txid }) });
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { console.error("Error", error); }
                };
                await Pi.createPayment(paymentData, callbacks);
            } catch (err) {
                console.error("Payment failed", err);
            }
        }

        document.getElementById('login-btn').addEventListener('click', auth);
        document.getElementById('pay-btn').addEventListener('click', createPayment);
    </script>
</body>
</html>
