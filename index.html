<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });

        // This runs the moment the page opens to find stuck payments
        async function checkPending() {
            try {
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                
                // This is the magic part: it asks the Pi Network for the "stuck" payment
                const incompletePayment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Completing Stage 10",
                    metadata: { stage: "10" }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/approve', { method: 'POST', body: JSON.stringify({ paymentId: id }), headers: {'Content-Type': 'application/json'} }),
                    onReadyForServerCompletion: (id, txid) => {
                        fetch('/api/complete', { method: 'POST', body: JSON.stringify({ paymentId: id, txid: txid }), headers: {'Content-Type': 'application/json'} });
                        alert("STAGE 10 VERIFIED AND COMPLETED!");
                    },
                    onCancel: (id) => console.log(id),
                    onError: (err) => {
                        if (err.message.includes("pending payment")) {
                            alert("Found your pending payment! Please refresh and try once more.");
                        } else {
                            alert("Note: " + err.message);
                        }
                    }
                });
            } catch (e) { console.log(e.message); }
        }
    </script>
</head>
<body onload="checkPending()" style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <p>Handshaking with Pi Network...</p>
    <button onclick="checkPending()" style="padding:20px; border-radius:50px; background:#E68A00; color:white; border:none; font-weight:bold; cursor:pointer;">MANUAL VERIFY</button>
</body>
</html>
