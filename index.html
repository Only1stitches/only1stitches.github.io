<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Welcome to CampusLuv</h1>
    <button id="pay-button">Pay with Pi</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function auth() {
            try {
                const scopes = ['payments', 'username'];
                // This function clears the "Pending Payment" error on login
                function onIncompletePaymentFound(payment) {
                    console.log("Found incomplete payment:", payment.identifier);
                    return fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                    });
                };

                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                console.log(`Hello ${user.user.username}`);
            } catch (err) {
                console.error(err);
            }
        }

        auth();

        document.getElementById('pay-button').onclick = function() {
            Pi.createPayment({
                amount: 1, // Set your price
                memo: "CampusLuv Premium", 
                metadata: { internal_id: "user_123" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    return fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    return fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    });
                },
                onCancel: function(paymentId) { console.log("Cancelled", paymentId); },
                onError: function(error, payment) { console.error("Error", error); }
            });
        };
    </script>
</body>
</html>
