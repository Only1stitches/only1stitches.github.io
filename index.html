<!DOCTYPE html>
<html>
<head>
    <title>CampusLuv</title>
    <!-- This line connects your site to the Pi Network -->
    <script src="https://sdk.minepi.com"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });

        async function makePayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Test payment for CampusLuv",
                    metadata: { internalId: "test-001" },
                }, {
                    onReadyForServerApproval: (paymentId) => { console.log("Ready!"); },
                    onReadyForServerCompletion: (paymentId, txid) => { console.log("Done!"); },
                    onCancel: (paymentId) => { alert("Payment Cancelled"); },
                    onError: (error, payment) => { console.error(error); },
                });
            } catch (err) {
                alert("Please open this in the Pi Browser!");
            }
        }
    </script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif;">
    <h1>Welcome to CampusLuv</h1>
    <p>Click below to complete your final stage!</p>
    
    <!-- This is your "Pay" button -->
    <button onclick="makePayment()" style="padding: 20px 40px; background: #673ab7; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;">
        Pay 1 Test-Pi
    </button>
</body>
</html>
