<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });
        async function runFinalVerify() {
            try {
                await Pi.authenticate(['username', 'payments'], (p) => {});
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Stage 10 Verification",
                    metadata: { stage: "10" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        fetch('/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        fetch('/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                        alert("SUCCESS: STAGE 10 VERIFIED!");
                    },
                    onCancel: (id) => console.log("Cancelled"),
                    onError: (err) => alert("Note: " + err.message)
                });
            } catch (e) { alert(e.message); }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <p>Waiting for network reset...</p>
    <button onclick="runFinalVerify()" style="padding:20px; border-radius:50px; background:#E68A00; color:white; border:none; font-weight:bold;">FINISH CONFIRMATION</button>
</body>
</html>
