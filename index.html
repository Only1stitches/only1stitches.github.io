<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });

        async function finishChecklist() {
            try {
                // Step 1: Login
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                
                // Step 2: Create Payment
                // We use a tiny amount (0.01) to make it fast
                const payment = await Pi.createPayment({
                    amount: 0.01,
                    memo: "Final Checklist Step 10",
                    metadata: { checklist: "true" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // This tells the Pi Network the app 'approves' the payment request
                        console.log("App approved payment:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Checklist Stage 10 Success! TXID: " + txid);
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { alert("Error: " + error.message); }
                });
            } catch (err) {
                alert("Please ensure you are using the Pi Browser.");
            }
        }
    </script>
    <style>
        body { background: #002d5b; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .btn { background: #E68A00; color: white; padding: 18px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <h1>CAMPUSLUV</h1>
    <p>Final Step: Process Transaction</p>
    
    <button class="btn" onclick="finishChecklist()">
        COMPLETE STAGE 10 NOW
    </button>
</body>
</html>
