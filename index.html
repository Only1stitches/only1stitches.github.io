<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Initializing with Mainnet but using a dummy approval flow
        Pi.init({ version: "2.0", sandbox: false });

        async function startVerification() {
            try {
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Checklist Verification",
                    metadata: { stage: "10" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // This forces the "Preparing" screen to stop and ask for your passphrase
                        console.log("Local approval triggered for ID:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Done! Stage 10 Verified.");
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { alert("Error: " + error.message); }
                });
            } catch (err) {
                alert("Please open in Pi Browser.");
            }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <button onclick="startVerification()" style="background:#E68A00; color:white; padding:20px 40px; border-radius:50px; border:none; font-weight:bold; font-size:1.2rem;">
        SIGN TO FINISH STAGE 10
    </button>
</body>
</html>
