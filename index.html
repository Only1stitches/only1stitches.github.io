<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv Verification</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Use sandbox: true to force a Test-Pi interaction for the checklist
        Pi.init({ version: "2.0", sandbox: true });

        async function triggerWallet() {
            try {
                // This 'onIncompletePaymentFound' is the secret to fixing the loop
                const scopes = ['username', 'payments'];
                const onIncompletePaymentFound = (payment) => { console.log("Clearing old payment..."); };
                
                await Pi.authenticate(scopes, onIncompletePaymentFound);

                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Checklist Stage 10",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // FORCE APPROVAL: This is what triggers the Passphrase prompt
                        console.log("Requesting Passphrase for:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Done! Stage 10 Verified.");
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { alert("Error: " + error.message); }
                });
            } catch (err) {
                alert("Please open this in the Pi Browser.");
            }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <button onclick="triggerWallet()" style="background:#E68A00; color:white; padding:25px; border-radius:50px; border:none; font-weight:bold; font-size:1.2rem;">
        OPEN WALLET & SIGN
    </button>
</body>
</html>
