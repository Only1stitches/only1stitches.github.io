<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv Pay Test</title>
    <script src="https://sdk.minepi.com"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif;">

    <h1>CampusLuv Step 10</h1>
    <p id="status">Please wait, connecting to Pi...</p>
    
    <button id="pay-button" style="display:none; padding: 15px 30px; font-size: 18px; background: #673ab7; color: white; border: none; border-radius: 8px;">
        Pay 1 Test-Pi
    </button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // Step A: Authenticate the user first
        async function auth() {
            try {
                const scopes = ['payments'];
                const user = await Pi.authenticate(scopes, (payment) => {
                    console.log("Payment in progress...", payment);
                });
                document.getElementById('status').innerText = "Hello " + user.user.username + "! Ready to test.";
                document.getElementById('pay-button').style.display = "inline-block";
            } catch (err) {
                document.getElementById('status').innerText = "Auth failed. Open this in the Pi Browser!";
            }
        }

        // Step B: The Payment Function
        document.getElementById('pay-button').onclick = async function() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Testing Step 10 for CampusLuv",
                    metadata: { developer_approved: true }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // This tells the Pi Sandbox to auto-approve the test
                        console.log("Requesting approval for:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Success! Transaction ID: " + txid);
                    },
                    onCancel: (paymentId) => { alert("Payment Cancelled"); },
                    onError: (error, paymentId) => { alert("Error: " + error.message); },
                });
            } catch (err) {
                alert("Payment Error: " + err.message);
            }
        };

        // Start Auth on load
        auth();
    </script>
</body>
</html>
