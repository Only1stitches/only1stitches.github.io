<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });

        async function handlePending() {
            try {
                // This asks Pi for any payments that are stuck
                await Pi.authenticate(['username', 'payments'], async (p) => {
                    alert("Checking for stuck payments...");
                });
                
                // This triggers the SDK to find the "Pending" one from your screenshot
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Clearing Stuck Payment",
                    metadata: { stage: "10" }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/approve', { method: 'POST', body: JSON.stringify({ paymentId: id }), headers: {'Content-Type': 'application/json'} }),
                    onReadyForServerCompletion: (id, txid) => {
                        fetch('/api/complete', { method: 'POST', body: JSON.stringify({ paymentId: id, txid: txid }), headers: {'Content-Type': 'application/json'} });
                        alert("STUCK PAYMENT CLEARED!");
                    },
                    onCancel: (id) => console.log(id),
                    onError: (err) => {
                        // If it says "Pending payment exists", the SDK usually returns the ID
                        alert("Error during reset: " + err.message);
                    }
                });
            } catch (e) { alert(e.message); }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <p>If you see 'Pending Payment', click below:</p>
    <button onclick="handlePending()" style="padding:20px; border-radius:50px; background:#E68A00; color:white; border:none; font-weight:bold; cursor:pointer;">FORCE COMPLETE & VERIFY</button>
</body>
</html>
