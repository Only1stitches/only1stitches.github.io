<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });
    </script>
    <style>
        body {
            background-color: #0047AB; /* Your Blue Background */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .tagline { font-size: 1.2rem; opacity: 0.9; }
        .btn {
            background: linear-gradient(45deg, #E68A00, #FFB347);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1>CAMPUSLUV</h1>
    <p class="tagline">Students' World: Learn • Connect • Earn • Live</p>
    <button class="btn">Launch App</button>
</body>
</html>
