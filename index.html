<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });

        async function handlePi() {
            try {
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Final Checklist Fix",
                    metadata: { stage: "10" }
                }, {
                    onReadyForServerApproval: async (id) => {
                        await fetch('/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id })
                        });
                    },
                    onReadyForServerCompletion: async (id, txid) => {
                        await fetch('/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, txid: txid })
                        });
                        alert("VERIFIED! YOU ARE DONE!");
                    },
                    onCancel: (id) => console.log("Cancelled"),
                    onError: (err) => {
                        if (err.message.includes("pending")) {
                            alert("Found it! Click OK, then REFRESH the page and click the button again.");
                        } else {
                            alert("Error: " + err.message);
                        }
                    }
                });
            } catch (e) { alert(e.message); }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <button onclick="handlePi()" style="padding:20px 40px; border-radius:50px; background:#ffbc00; color:#002d5b; border:none; font-weight:bold; font-size:1.2rem; cursor:pointer;">FINAL VERIFY</button>
</body>
</html>
