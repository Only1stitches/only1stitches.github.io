<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Welcome to CampusLuv</h1>
    <div id="user-info"></div>
    <button id="login-btn" style="padding: 10px 20px; background: #673ab7; color: white; border: none; border-radius: 5px;">Login with Pi</button>

    <script>
        // Initialize Pi SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        // Function to handle payments that got stuck before
        async function onIncompletePaymentFound(payment) {
            console.log("Found incomplete payment:", payment.identifier);
            await fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    paymentId: payment.identifier, 
                    txid: payment.transaction.txid 
                })
            });
        };

        // Login Function
        async function auth() {
            try {
                const scopes = ['payments', 'username'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('user-info').innerHTML = `Hi, ${auth.user.username}!`;
                document.getElementById('login-btn').style.display = 'none';
                console.log("Authenticated:", auth);
            } catch (err) {
                console.error("Auth failed:", err);
            }
        }

        document.getElementById('login-btn').addEventListener('click', auth);
    </script>
</body>
</html>
